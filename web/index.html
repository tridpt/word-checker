<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kiểm tra file Word trước khi nộp</title>
<style>
  :root { --blue:#2b6cb0; --bg:#f4f6f8; --border:#e0e4e8; }
  * { box-sizing: border-box; }
  body { font-family: "Segoe UI", Arial, sans-serif; margin:0; background:var(--bg); color:#222; }
  header { background:var(--blue); color:#fff; padding:18px 24px; }
  header h1 { margin:0; font-size:20px; }
  header p { margin:4px 0 0; opacity:.9; font-size:13px; }
  main { max-width:980px; margin:24px auto; padding:0 16px; }
  .panel { background:#fff; border:1px solid var(--border); border-radius:10px; padding:20px; margin-bottom:20px; }
  #drop { border:2px dashed #b8c2cc; border-radius:12px; padding:40px; text-align:center; color:#667; cursor:pointer; transition:.15s; }
  #drop.over { border-color:var(--blue); background:#eef4fb; color:var(--blue); }
  #drop strong { color:var(--blue); }
  .opts { display:flex; flex-wrap:wrap; gap:16px; align-items:center; margin-top:16px; font-size:14px; }
  .opts label { display:flex; align-items:center; gap:6px; }
  select { padding:6px 8px; border:1px solid var(--border); border-radius:6px; }
  .btns { margin-top:16px; display:flex; gap:10px; flex-wrap:wrap; }
  button { border:none; border-radius:8px; padding:10px 16px; font-size:14px; cursor:pointer; }
  .primary { background:var(--blue); color:#fff; }
  .ghost { background:#e8edf2; color:#333; }
  button:disabled { opacity:.5; cursor:not-allowed; }
  .summary { display:flex; gap:18px; flex-wrap:wrap; margin-bottom:14px; }
  .stat { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 16px; min-width:90px; text-align:center; }
  .stat b { display:block; font-size:22px; }
  .stat span { font-size:12px; color:#667; }
  table { border-collapse:collapse; width:100%; font-size:14px; }
  th,td { border:1px solid var(--border); padding:8px 10px; text-align:left; vertical-align:top; }
  th { background:var(--blue); color:#fff; position:sticky; top:0; }
  tr.error td { background:#fff5f5; }
  tr.warning td { background:#fffaf0; }
  td.ex { font-family:Consolas,monospace; font-size:13px; color:#444; }
  .tag { font-size:12px; padding:2px 8px; border-radius:10px; color:#fff; }
  .tag.error { background:#c53030; }
  .tag.warning { background:#dd6b20; }
  .ok { color:#2f855a; font-weight:bold; font-size:16px; }
  .err-msg { color:#c53030; }
  .muted { color:#778; font-size:13px; }
  #fileName { margin-top:10px; font-weight:bold; color:var(--blue); }
  .hidden { display:none; }
</style>
</head>
<body>
<header>
  <h1>Kiểm tra chính tả &amp; định dạng file Word</h1>
  <p>Kéo file .docx vào đây để rà soát trước khi nộp — chạy cục bộ trên máy bạn.</p>
</header>

<main>
  <div class="panel">
    <div id="drop">
      <p>📄 <strong>Kéo &amp; thả</strong> file .docx vào đây, hoặc bấm để chọn file.</p>
      <p class="muted">Chỉ hỗ trợ định dạng .docx (Word). File không được gửi đi đâu cả.</p>
    </div>
    <input type="file" id="fileInput" accept=".docx" class="hidden">
    <div id="fileName"></div>

    <div class="opts">
      <label>Quy chuẩn:
        <select id="profile">
          {% for p in profiles %}
          <option value="{{ p }}" {% if p == default %}selected{% endif %}>{{ p }}</option>
          {% endfor %}
        </select>
      </label>
      <label title="Tùy chọn: học quy chuẩn từ một file .docx mẫu (sẽ ưu tiên hơn lựa chọn quy chuẩn ở trên)">
        hoặc file mẫu:
        <input type="file" id="templateInput" accept=".docx">
      </label>
      <label><input type="checkbox" id="optFormat" checked> Định dạng</label>
      <label><input type="checkbox" id="optText" checked> Lỗi văn bản</label>
      <label><input type="checkbox" id="optHeading" checked> Tiêu đề</label>
      <label><input type="checkbox" id="optSpelling" checked> Chính tả</label>
      {% if llm_enabled %}
      <label title="Dùng AI/LLM để bắt lỗi rộng hơn (chậm hơn)"><input type="checkbox" id="optLlm"> Chính tả AI</label>
      {% endif %}
    </div>

    <div class="btns">
      <button class="primary" id="btnCheck" disabled>Kiểm tra</button>
      <button class="ghost" id="btnFix" disabled>Tự động sửa &amp; tải về</button>
      <button class="ghost" id="btnAnnotate" disabled>Tải file có chú thích lỗi</button>
    </div>
  </div>

  <div class="panel hidden" id="resultPanel">
    <div id="resultHead"></div>
    <div id="resultBody"></div>
  </div>
</main>

<script>
const drop = document.getElementById('drop');
const fileInput = document.getElementById('fileInput');
const fileNameEl = document.getElementById('fileName');
const btnCheck = document.getElementById('btnCheck');
const btnFix = document.getElementById('btnFix');
const btnAnnotate = document.getElementById('btnAnnotate');
const resultPanel = document.getElementById('resultPanel');
const resultHead = document.getElementById('resultHead');
const resultBody = document.getElementById('resultBody');
let selectedFile = null;

function setFile(file) {
  if (!file) return;
  if (!file.name.toLowerCase().endsWith('.docx')) {
    alert('Chỉ hỗ trợ file .docx');
    return;
  }
  selectedFile = file;
  fileNameEl.textContent = 'Đã chọn: ' + file.name;
  btnCheck.disabled = false;
  btnFix.disabled = false;
  btnAnnotate.disabled = false;
}

drop.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => setFile(e.target.files[0]));
['dragenter','dragover'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave','drop'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => setFile(e.dataTransfer.files[0]));

function buildForm() {
  const fd = new FormData();
  fd.append('file', selectedFile);
  fd.append('profile', document.getElementById('profile').value);
  const tplEl = document.getElementById('templateInput');
  if (tplEl && tplEl.files && tplEl.files[0]) {
    fd.append('template', tplEl.files[0]);
  }
  fd.append('format', document.getElementById('optFormat').checked ? '1' : '0');
  fd.append('text', document.getElementById('optText').checked ? '1' : '0');
  fd.append('headings', document.getElementById('optHeading').checked ? '1' : '0');
  fd.append('spelling', document.getElementById('optSpelling').checked ? '1' : '0');
  const llmEl = document.getElementById('optLlm');
  fd.append('llm', (llmEl && llmEl.checked) ? '1' : '0');
  return fd;
}

btnCheck.addEventListener('click', async () => {
  if (!selectedFile) return;
  btnCheck.disabled = true; btnCheck.textContent = 'Đang kiểm tra...';
  try {
    const res = await fetch('/check', { method:'POST', body: buildForm() });
    const data = await res.json();
    if (!res.ok) { showError(data.error || 'Lỗi không xác định'); return; }
    render(data);
  } catch (e) {
    showError('Không kết nối được tới server.');
  } finally {
    btnCheck.disabled = false; btnCheck.textContent = 'Kiểm tra';
  }
});

async function downloadFrom(endpoint, btn, busyLabel, normalLabel, suffix) {
  if (!selectedFile) return;
  btn.disabled = true; const old = btn.textContent; btn.textContent = busyLabel;
  try {
    const res = await fetch(endpoint, { method:'POST', body: buildForm() });
    if (!res.ok) { const d = await res.json(); showError(d.error || 'Có lỗi xảy ra'); return; }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = selectedFile.name.replace(/\.docx$/i, suffix);
    a.click();
    URL.revokeObjectURL(url);
  } catch (e) {
    showError('Không kết nối được tới server.');
  } finally {
    btn.disabled = false; btn.textContent = old;
  }
}

btnFix.addEventListener('click', () =>
  downloadFrom('/fix', btnFix, 'Đang sửa...', 'Tự động sửa & tải về', '_fixed.docx'));

btnAnnotate.addEventListener('click', () =>
  downloadFrom('/annotate', btnAnnotate, 'Đang tạo...', 'Tải file có chú thích lỗi', '_commented.docx'));

function showError(msg) {
  resultPanel.classList.remove('hidden');
  resultHead.innerHTML = '<p class="err-msg">⚠ ' + escapeHtml(msg) + '</p>';
  resultBody.innerHTML = '';
}

function escapeHtml(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function render(data) {
  resultPanel.classList.remove('hidden');
  const s = data.summary;
  let cats = Object.entries(s.by_category).map(([k,v]) =>
    `<div class="stat"><b>${v}</b><span>${escapeHtml(k)}</span></div>`).join('');
  resultHead.innerHTML =
    `<div class="summary">
       <div class="stat"><b>${s.total}</b><span>tổng vấn đề</span></div>
       <div class="stat"><b>${s.errors}</b><span>lỗi nghiêm trọng</span></div>
       ${cats}
     </div>`;

  if (s.total === 0) {
    resultBody.innerHTML = '<p class="ok">✓ Không phát hiện lỗi nào. File sẵn sàng để nộp!</p>';
    return;
  }
  let rows = data.issues.map(it =>
    `<tr class="${it.severity}">
       <td><span class="tag ${it.severity}">${it.severity === 'error' ? 'Lỗi' : 'Cảnh báo'}</span></td>
       <td>${escapeHtml(it.category)}</td>
       <td>${escapeHtml(it.location)}</td>
       <td>${escapeHtml(it.message)}</td>
       <td class="ex">${escapeHtml(it.excerpt)}</td>
       <td>${escapeHtml(it.suggestion)}</td>
     </tr>`).join('');
  resultBody.innerHTML =
    `<table><thead><tr><th></th><th>Nhóm</th><th>Vị trí</th><th>Mô tả</th><th>Trích đoạn</th><th>Gợi ý</th></tr></thead>
     <tbody>${rows}</tbody></table>`;
}
</script>
</body>
</html>
